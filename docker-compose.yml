services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: waitlayer
      POSTGRES_USER: waitlayer
      POSTGRES_PASSWORD: waitlayer-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitlayer -d waitlayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - "4002:4000"
    environment:
      DATABASE_URL: postgresql://waitlayer:waitlayer-dev@postgres:5432/waitlayer
      JWT_SECRET: change-me-in-production-32chars-ok
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      EXTENSION_HMAC_SECRET: dev-secret-change-me
      API_PORT: "4000"
      GOOGLE_CLIENT_ID: "53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com"
      WEB_BASE_URL: http://localhost:3000
      NODE_ENV: production
      ALLOW_MOCK_GOOGLE: "true"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4002/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com"
      NODE_ENV: production
      NEXT_PUBLIC_ALLOW_MOCK_AUTH: "true"
    depends_on:
      - api

volumes:
  pgdata: