# Docker Compose reference for WaitLayer.
#
# Profiles:
#   (default)  — postgres, redis, api, web (local dev / demo)
#   test       — adds `postgres-test` (a fresh, isolated DB on :5433) for
#                running the integration suite without touching the dev DB:
#                  docker compose --profile test up -d postgres-test
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: waitlayer
      POSTGRES_USER: waitlayer
      POSTGRES_PASSWORD: waitlayer-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitlayer -d waitlayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Isolated Postgres for the integration test suite (profile `test`). Keeps
  # the dev DB untouched when running `pnpm --filter waitlayer-api test`.
  postgres-test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: waitlayer_test
      POSTGRES_USER: waitlayer
      POSTGRES_PASSWORD: waitlayer-test
    ports:
      - "5433:5432"
    volumes:
      - pgtestdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitlayer -d waitlayer_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgresql://waitlayer:waitlayer-dev@postgres:5432/waitlayer
      REDIS_URL: redis://redis:6379
      # ── WARNING: Dev-only secrets ──
      # These are visible to anyone who can read this file. Production deploys
      # MUST override EVERY one of these via a .env file, Docker secrets, or
      # your secrets manager.
      # The @waitlayer/config refine() rejects keys containing "change-me" or
      # "replace-with" — placeholders below are crafted to pass validation
      # while being trivially distinguishable from real secrets.
      JWT_SECRET: dev-only-docker-compose-jwt-secret-at-least-32-char
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      API_PORT: "4002"
      GOOGLE_CLIENT_ID: "53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com"
      WEB_BASE_URL: http://localhost:3000
      # docker-compose is a developer convenience — run with dev NODE_ENV so the
      # google-token verifier's mock path remains available. Production deploys
      # must override NODE_ENV=production AND set real secrets.
      NODE_ENV: development
      # Enable the mock-google-token path so local dev can sign in without a
      # real Google account. The verifier requires BOTH NODE_ENV !== 'production'
      # AND an explicit flag — never set this in staging/production.
      ALLOW_MOCK_GOOGLE: "true"
      EMAIL_DRIVER: console
      EMAIL_FROM: noreply@waitlayer.local
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      # Sentry — uncomment to enable error monitoring locally
      # SENTRY_DSN: https://your-dsn@o123456.ingest.sentry.io/654321
      # SENTRY_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4002/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4002/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com"
      JWT_SECRET: dev-only-docker-compose-jwt-secret-at-least-32-char
      # Match the api service — dev convenience compose uses NODE_ENV=development
      # so the mock-google sign-in button remains available for local testing.
      NODE_ENV: development
      NEXT_PUBLIC_ALLOW_MOCK_AUTH: "true"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  pgtestdata:
