name: Staging Release Gate

# PR-triggered runs can only verify the definition; the staging gate itself is
# triggered manually (workflow_dispatch) so a human controls when staging is
# mutated and when production is promoted. Both gates require environment
# approval (configured in repo Settings > Environments).
on:
  workflow_dispatch:
    inputs:
      full_flow:
        description: 'Run the mandatory financial loop (P0 #7). Disabling it fails the gate.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Apply migrations to the staging database (A-012 release gate) and prove the
  # schema is fully migrated with no drift. Gated by the `staging` environment
  # so no staging mutation happens without approval.
  migrate-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.STAGING_JWT_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Apply migrations to staging
        run: pnpm --filter @waitlayer/db migrate:deploy
      - name: Assert no pending migrations
        run: pnpm --filter @waitlayer/db migrate:status
      - name: Assert migration-built schema has no drift
        run: pnpm --filter @waitlayer/db migrate:drift

  # Boot/deploy the staging build and run the end-to-end smoke (deploy staging,
  # run migrations, create a test campaign, run extension->ledger flow, process
  # a sandbox payout, verify alerts). Gated by `staging` approval.
  staging-smoke:
    needs: migrate-staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    outputs:
      api_digest: ${{ steps.staging-images.outputs.api_digest }}
      web_digest: ${{ steps.staging-images.outputs.web_digest }}
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.STAGING_JWT_PUBLIC_KEY }}
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_FULL_FLOW: ${{ inputs.full_flow == true && '1' || '0' }}
      STAGING_WAIT_ATTESTATION_PROVIDER: ${{ secrets.STAGING_WAIT_ATTESTATION_PROVIDER }}
      STAGING_WAIT_ATTESTATION_BRIDGE_URL: ${{ secrets.STAGING_WAIT_ATTESTATION_BRIDGE_URL }}
      STAGING_WAIT_ATTESTATION_BRIDGE_TOKEN: ${{ secrets.STAGING_WAIT_ATTESTATION_BRIDGE_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Build workspace packages
        # Smoke test imports built @waitlayer/shared and @waitlayer/db packages,
        # so they must be compiled before the script runs.
        run: pnpm run build
      - name: Validate staging deployment configuration
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          REGISTRY_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          STAGING_WAIT_ATTESTATION_PROVIDER: ${{ secrets.STAGING_WAIT_ATTESTATION_PROVIDER }}
          STAGING_WAIT_ATTESTATION_BRIDGE_URL: ${{ secrets.STAGING_WAIT_ATTESTATION_BRIDGE_URL }}
          STAGING_WAIT_ATTESTATION_ISSUERS: ${{ secrets.STAGING_WAIT_ATTESTATION_ISSUERS }}
          STAGING_WAIT_ATTESTATION_VERSIONS: ${{ secrets.STAGING_WAIT_ATTESTATION_VERSIONS }}
        run: |
          for required in REGISTRY REGISTRY_USER REGISTRY_PASS STAGING_HOST STAGING_USER STAGING_DEPLOY_KEY STAGING_KNOWN_HOSTS STAGING_DEPLOY_PATH STAGING_WAIT_ATTESTATION_PROVIDER STAGING_WAIT_ATTESTATION_BRIDGE_URL STAGING_WAIT_ATTESTATION_ISSUERS STAGING_WAIT_ATTESTATION_VERSIONS; do
            if [ -z "${!required}" ]; then
              echo "$required secret is required for an actual staging release" >&2
              exit 1
            fi
          done
      - name: Log in to container registry
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          REGISTRY_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
        run: echo "$REGISTRY_PASS" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
      - name: Build API + web images for staging
        run: docker compose -f docker-compose.yml build api web
        env:
          # JWT_SECRET is a runtime-only secret; never pass it to docker build.
          # Never emit buildx provenance/SBOM attestations (they record
          # build-arg values) — P0.8 defense-in-depth.
          BUILDX_NO_DEFAULT_ATTESTATIONS: '1'
          WAITLAYER_API_IMAGE: ${{ secrets.CONTAINER_REGISTRY }}/waitlayer-api:staging-${{ github.sha }}
          WAITLAYER_WEB_IMAGE: ${{ secrets.CONTAINER_REGISTRY }}/waitlayer-web:staging-${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
      - name: Resolve and push staging images to registry
        id: staging-images
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
        run: |
          API_IMG="$REGISTRY/waitlayer-api:staging-$GITHUB_SHA"
          WEB_IMG="$REGISTRY/waitlayer-web:staging-$GITHUB_SHA"
          docker push "$API_IMG"
          docker push "$WEB_IMG"
          API_DIGEST=$(docker image inspect --format '{{index .RepoDigests 0}}' "$API_IMG")
          WEB_DIGEST=$(docker image inspect --format '{{index .RepoDigests 0}}' "$WEB_IMG")
          test -n "$API_DIGEST" || { echo "API image digest could not be resolved" >&2; exit 1; }
          test -n "$WEB_DIGEST" || { echo "Web image digest could not be resolved" >&2; exit 1; }
          echo "api_image=$API_IMG" >> "$GITHUB_OUTPUT"
          echo "web_image=$WEB_IMG" >> "$GITHUB_OUTPUT"
          echo "api_digest=$API_DIGEST" >> "$GITHUB_OUTPUT"
          echo "web_digest=$WEB_DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pushed staging images by digest: $API_DIGEST, $WEB_DIGEST"
      - name: Deploy exact staging image digests
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          REGISTRY_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          STAGING_WAIT_ATTESTATION_ISSUERS: ${{ secrets.STAGING_WAIT_ATTESTATION_ISSUERS }}
          STAGING_WAIT_ATTESTATION_VERSIONS: ${{ secrets.STAGING_WAIT_ATTESTATION_VERSIONS }}
          API_DIGEST: ${{ steps.staging-images.outputs.api_digest }}
          WEB_DIGEST: ${{ steps.staging-images.outputs.web_digest }}
        run: |
          KEY_FILE="$RUNNER_TEMP/staging_deploy_key"
          KNOWN_HOSTS_FILE="$RUNNER_TEMP/staging_known_hosts"
          printf '%s\n' "$STAGING_DEPLOY_KEY" > "$KEY_FILE"
          printf '%s\n' "$STAGING_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
          chmod 600 "$KEY_FILE"
          SSH_OPTS=(-i "$KEY_FILE" -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE")
          printf '%s\n' "$REGISTRY_PASS" | ssh "${SSH_OPTS[@]}" "$STAGING_USER@$STAGING_HOST" \
            "docker login '$REGISTRY' -u '$REGISTRY_USER' --password-stdin"
          ATTESTATION_ISSUERS_B64=$(printf '%s' "$STAGING_WAIT_ATTESTATION_ISSUERS" | base64 -w0)
          ATTESTATION_VERSIONS_B64=$(printf '%s' "$STAGING_WAIT_ATTESTATION_VERSIONS" | base64 -w0)
          ssh "${SSH_OPTS[@]}" "$STAGING_USER@$STAGING_HOST" \
            "set -e; cd '$STAGING_DEPLOY_PATH'; export WAITLAYER_API_IMAGE='$API_DIGEST'; export WAITLAYER_WEB_IMAGE='$WEB_DIGEST'; export ENABLE_STAGING_FAUCET=true; export WAIT_ATTESTATION_ISSUERS=\"\$(printf '%s' '$ATTESTATION_ISSUERS_B64' | base64 -d)\"; export VERIFIED_WAIT_ATTESTATION_VERSIONS=\"\$(printf '%s' '$ATTESTATION_VERSIONS_B64' | base64 -d)\"; docker compose pull && docker compose up -d --wait"
      - name: Run staging smoke test against the deployed digest
        run: node scripts/staging-smoke.mjs
        env:
          ENABLE_STAGING_FAUCET: 'true'
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_WAIT_ATTESTATION_PROVIDER: ${{ secrets.STAGING_WAIT_ATTESTATION_PROVIDER }}
          STAGING_WAIT_ATTESTATION_BRIDGE_URL: ${{ secrets.STAGING_WAIT_ATTESTATION_BRIDGE_URL }}
          STAGING_WAIT_ATTESTATION_BRIDGE_TOKEN: ${{ secrets.STAGING_WAIT_ATTESTATION_BRIDGE_TOKEN }}

  # Apply and validate production migrations BEFORE any image is allowed to
  # replace the live service. This is intentionally its own environment-gated
  # job so the database transition has an auditable approval boundary.
  migrate-production:
    needs: staging-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate production migration configuration
        run: |
          test -n "$DATABASE_URL" || {
            echo "PRODUCTION_DATABASE_URL is required before production promotion" >&2
            exit 1
          }
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Apply migrations to production before deploy
        run: pnpm --filter @waitlayer/db migrate:deploy
      - name: Assert production has no pending migrations or drift
        run: |
          pnpm --filter @waitlayer/db migrate:status
          pnpm --filter @waitlayer/db migrate:drift

  # Final approval gate before production. Requires the `production` environment
  # to have required reviewers configured, so a second human sign-off is
  # mandatory after the staging smoke passes. The promotion performs an actual
  # deployment (pull the exact staging image digest that passed smoke tests) and
  # a post-deploy canary that probes the production API for liveness and
  # migration status.
  promote-production:
    needs: [staging-smoke, migrate-production]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      # PRODUCTION_API_URL must include the /api/v1 prefix.
      # Example: https://api.waitlayer.com/api/v1
      PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Promote production images (pull same digest as staging, tag, push, deploy)
        id: promote
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          REGISTRY_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          PROD_HOST: ${{ secrets.PRODUCTION_HOST }}
          PROD_USER: ${{ secrets.PRODUCTION_USER }}
          PROD_DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PROD_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          STAGING_API_DIGEST: ${{ needs.staging-smoke.outputs.api_digest }}
          STAGING_WEB_DIGEST: ${{ needs.staging-smoke.outputs.web_digest }}
        run: |
          SHA="$GITHUB_SHA"
          for required in REGISTRY REGISTRY_USER REGISTRY_PASS PROD_HOST PROD_USER PROD_DEPLOY_KEY PROD_KNOWN_HOSTS PROD_DEPLOY_PATH STAGING_API_DIGEST STAGING_WEB_DIGEST; do
            if [ -z "${!required}" ]; then
              echo "$required secret or staging output is required for production promotion" >&2
              exit 1
            fi
          done

          PROD_API_TAG="$REGISTRY/waitlayer-api:production-$SHA"
          PROD_WEB_TAG="$REGISTRY/waitlayer-web:production-$SHA"
          PROD_API_LATEST="$REGISTRY/waitlayer-api:production-latest"
          PROD_WEB_LATEST="$REGISTRY/waitlayer-web:production-latest"

          echo "Logging in to container registry $REGISTRY ..."
          echo "$REGISTRY_PASS" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

          echo "Pulling the exact staging digests and tagging for production ..."
          docker pull "$STAGING_API_DIGEST"
          docker pull "$STAGING_WEB_DIGEST"
          docker tag "$STAGING_API_DIGEST" "$PROD_API_TAG"
          docker tag "$STAGING_WEB_DIGEST" "$PROD_WEB_TAG"
          docker tag "$PROD_API_TAG" "$PROD_API_LATEST"
          docker tag "$PROD_WEB_TAG" "$PROD_WEB_LATEST"
          docker push "$PROD_API_TAG"
          docker push "$PROD_WEB_TAG"
          docker push "$PROD_API_LATEST"
          docker push "$PROD_WEB_LATEST"

          echo "Deploying the smoke-tested digests to production host $PROD_HOST ..."
          KEY_FILE="$RUNNER_TEMP/production_deploy_key"
          KNOWN_HOSTS_FILE="$RUNNER_TEMP/production_known_hosts"
          printf '%s\n' "$PROD_DEPLOY_KEY" > "$KEY_FILE"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
          chmod 600 "$KEY_FILE"
          SSH_OPTS=(-i "$KEY_FILE" -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE")
          printf '%s\n' "$REGISTRY_PASS" | ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "docker login '$REGISTRY' -u '$REGISTRY_USER' --password-stdin"
          # Capture the running immutable image references before changing
          # anything. A promotion without a known predecessor is not
          # recoverable, so fail before deployment rather than leaving a
          # comment-only rollback plan.
          PREVIOUS_API_IMAGE=$(ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "set -e; cd '$PROD_DEPLOY_PATH'; cid=\$(docker compose ps -q api); test -n \"\$cid\"; docker inspect --format '{{.Config.Image}}' \"\$cid\"")
          PREVIOUS_WEB_IMAGE=$(ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "set -e; cd '$PROD_DEPLOY_PATH'; cid=\$(docker compose ps -q web); test -n \"\$cid\"; docker inspect --format '{{.Config.Image}}' \"\$cid\"")
          test -n "$PREVIOUS_API_IMAGE" || { echo "No previous API image found; refusing non-recoverable promotion" >&2; exit 1; }
          test -n "$PREVIOUS_WEB_IMAGE" || { echo "No previous web image found; refusing non-recoverable promotion" >&2; exit 1; }
          echo "previous_api_image=$PREVIOUS_API_IMAGE" >> "$GITHUB_OUTPUT"
          echo "previous_web_image=$PREVIOUS_WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Captured rollback images: $PREVIOUS_API_IMAGE, $PREVIOUS_WEB_IMAGE"
          ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "set -e; cd '$PROD_DEPLOY_PATH'; export WAITLAYER_API_IMAGE='$STAGING_API_DIGEST'; export WAITLAYER_WEB_IMAGE='$STAGING_WEB_DIGEST'; docker compose pull && docker compose up -d --wait"

          echo "=== Production image promotion complete ==="
          echo "Commit: ${SHA:0:12}"
          echo "Deployed to: $PROD_USER@$PROD_HOST:$PROD_DEPLOY_PATH"
      - name: Post-deploy canary — verify production API is live
        run: |
          for i in $(seq 1 30); do
            HEALTH=$(curl --fail-with-body -s "${PRODUCTION_API_URL}/health/ready" 2>/dev/null || echo "{}")
            STATUS=$(node -e "console.log(JSON.parse(process.argv[1]).status || 'unknown')" "$HEALTH" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "ok" ]; then
              echo "Production API is live (health/ready → status=ok)"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Production API did not become healthy within timeout"; exit 1
            fi
            sleep 5
          done
      - name: Post-deploy canary — verify API version info (migrations up-to-date)
        run: |
          MIG_STATUS=$(curl -sf "${PRODUCTION_API_URL}/health/migrations" 2>/dev/null || echo '{"upToDate":false,"pendingCount":-1}')
          UP_TO_DATE=$(node -e "const b = JSON.parse(process.argv[1]).upToDate; console.log(b === true ? 'true' : 'false')" "$MIG_STATUS" 2>/dev/null || echo "false")
          PENDING=$(node -e "const n = JSON.parse(process.argv[1]).pendingCount; console.log(typeof n === 'number' ? n : -1)" "$MIG_STATUS" 2>/dev/null || echo "-1")
          if [ "$UP_TO_DATE" != "true" ]; then
            echo "Production API reports pending migrations: $PENDING"; exit 1
          fi
          echo "Production API migrations are up to date (pendingCount=$PENDING)"
      - name: Post-deploy canary — verify BFF + auth loop
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "${PRODUCTION_API_URL}/auth/login" \
            -H 'Content-Type: application/json' -d '{}')
          if [ "$STATUS" != "400" ]; then
            echo "Auth controller returned unexpected status $STATUS (expected 400 for empty body)"; exit 1
          fi
          echo "Auth BFF resolves over TCP with expected validation"
      - name: Rollback on canary failure
        if: failure()
        env:
          REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          REGISTRY_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          PROD_HOST: ${{ secrets.PRODUCTION_HOST }}
          PROD_USER: ${{ secrets.PRODUCTION_USER }}
          PROD_DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PROD_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          PREVIOUS_API_IMAGE: ${{ steps.promote.outputs.previous_api_image }}
          PREVIOUS_WEB_IMAGE: ${{ steps.promote.outputs.previous_web_image }}
        run: |
          echo "=== Canary FAILED — initiating rollback ==="
          for required in REGISTRY REGISTRY_USER REGISTRY_PASS PROD_HOST PROD_USER PROD_DEPLOY_KEY PROD_KNOWN_HOSTS PROD_DEPLOY_PATH PREVIOUS_API_IMAGE PREVIOUS_WEB_IMAGE; do
            if [ -z "${!required}" ]; then
              echo "$required is required for rollback; refusing to claim recovery succeeded" >&2
              exit 1
            fi
          done
          KEY_FILE="$RUNNER_TEMP/production_rollback_key"
          KNOWN_HOSTS_FILE="$RUNNER_TEMP/production_rollback_known_hosts"
          printf '%s\n' "$PROD_DEPLOY_KEY" > "$KEY_FILE"
          printf '%s\n' "$PROD_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
          chmod 600 "$KEY_FILE"
          SSH_OPTS=(-i "$KEY_FILE" -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE")
          printf '%s\n' "$REGISTRY_PASS" | ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "docker login '$REGISTRY' -u '$REGISTRY_USER' --password-stdin"
          ssh "${SSH_OPTS[@]}" "$PROD_USER@$PROD_HOST" \
            "set -e; cd '$PROD_DEPLOY_PATH'; export WAITLAYER_API_IMAGE='$PREVIOUS_API_IMAGE'; export WAITLAYER_WEB_IMAGE='$PREVIOUS_WEB_IMAGE'; docker compose pull && docker compose up -d --wait"
          echo "Rollback completed with the captured predecessor images."
      - name: Promote complete
        if: success()
        run: |
          echo "=== Production promotion complete ==="
          echo "Commit:  ${GITHUB_SHA:0:12}"
          echo "Approved by: ${GITHUB_ACTOR}"
