name: Staging Release Gate

# PR-triggered runs can only verify the definition; the staging gate itself is
# triggered manually (workflow_dispatch) so a human controls when staging is
# mutated and when production is promoted. Both gates require environment
# approval (configured in repo Settings > Environments).
on:
  workflow_dispatch:
    inputs:
      full_flow:
        description: 'Run campaign/ad/payout flow (requires seeded staging balance)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Apply migrations to the staging database (A-012 release gate) and prove the
  # schema is fully migrated with no drift. Gated by the `staging` environment
  # so no staging mutation happens without approval.
  migrate-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.STAGING_JWT_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Apply migrations to staging
        run: pnpm --filter @waitlayer/db migrate:deploy
      - name: Assert no pending migrations
        run: pnpm --filter @waitlayer/db migrate:status
      - name: Assert migration-built schema has no drift
        run: pnpm --filter @waitlayer/db migrate:drift

  # Boot/deploy the staging build and run the end-to-end smoke (deploy staging,
  # run migrations, create a test campaign, run extension->ledger flow, process
  # a sandbox payout, verify alerts). Gated by `staging` approval.
  staging-smoke:
    needs: migrate-staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      JWT_PRIVATE_KEY: ${{ secrets.STAGING_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.STAGING_JWT_PUBLIC_KEY }}
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_FULL_FLOW: ${{ github.event.inputs.full_flow == true && '1' || '0' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Build API + web images for staging
        run: docker compose -f docker-compose.yml build api web
        env:
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
      - name: Run staging smoke test
        run: pnpm --filter waitlayer-api exec node scripts/staging-smoke.mjs

  # Final approval gate before production. Requires the `production` environment
  # to have required reviewers configured, so a second human sign-off is
  # mandatory after the staging smoke passes.
  promote-production:
    needs: staging-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Promote to production
        run: |
          echo "Staging release gate passed. Production promotion approved by ${GITHUB_ACTOR}."
          echo "Environment-specific rollout (helm/terraform/cloud) belongs here."
