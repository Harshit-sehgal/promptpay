name: Publish CLI

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the packaged CLI tarball to npm after smoke tests pass
        type: boolean
        default: false

jobs:
  package-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Build CLI
        run: pnpm --filter waitlayer-cli build
      - name: Verify bin artifacts
        run: pnpm --filter waitlayer-cli pack:check
      - name: Pack CLI artifact
        run: |
          mkdir -p artifacts/cli
          pnpm --filter waitlayer-cli pack --pack-destination ../../artifacts/cli
      - name: Smoke install packaged CLI
        run: |
          npm install --global ./artifacts/cli/*.tgz
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --version
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --help
      - name: Upload CLI package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: waitlayer-cli-package
          path: artifacts/cli/*.tgz
          if-no-files-found: error

  publish-npm:
    needs: package-cli
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download CLI package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: waitlayer-cli-package
          path: artifacts/cli
      - name: Publish CLI to npm
        run: npm publish ./artifacts/cli/*.tgz --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
