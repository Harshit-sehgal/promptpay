name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer_test
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waitlayer -d waitlayer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
      JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      # Migration release gate (A-012): apply all migrations, then assert the
      # database is fully migrated and exactly matches schema.prisma.
      - name: Apply migrations
        run: pnpm --filter @waitlayer/db migrate:deploy
      - name: Assert no pending migrations
        run: pnpm --filter @waitlayer/db migrate:status
      - name: Assert migration-built schema has no drift
        run: pnpm --filter @waitlayer/db migrate:drift

      - name: Test
        run: pnpm test

      - name: Verify CLI bin artifacts exist
        run: pnpm --filter waitlayer-cli pack:check

  # Packaging smoke tests for distributed clients (A-043) — run without a DB.
  package-clients:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm --filter waitlayer-cli build
      - name: Verify CLI bin artifacts
        run: pnpm --filter waitlayer-cli pack:check
      - name: Pack CLI artifact
        run: |
          mkdir -p artifacts/cli
          pnpm --filter waitlayer-cli pack --pack-destination ../../artifacts/cli
      - name: Smoke install packaged CLI
        run: |
          npm install --global ./artifacts/cli/*.tgz
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --version
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --help
      - name: Build VS Code extension
        run: pnpm --filter waitlayer-vscode build
      - name: Package VS Code extension (no publish)
        run: |
          mkdir -p ../../artifacts/vscode
          pnpm exec vsce package --no-dependencies --out ../../artifacts/vscode/waitlayer-vscode.vsix
        working-directory: apps/vscode-extension
      - name: Smoke test VSIX metadata
        run: |
          test -s artifacts/vscode/waitlayer-vscode.vsix
          rm -rf /tmp/waitlayer-vsix
          mkdir -p /tmp/waitlayer-vsix
          unzip -q artifacts/vscode/waitlayer-vscode.vsix -d /tmp/waitlayer-vsix
          cp /tmp/waitlayer-vsix/extension/package.json /tmp/waitlayer-vscode-package.json
          node -e "const pkg = require('/tmp/waitlayer-vscode-package.json'); const url = pkg.contributes.configuration.properties['waitlayer.apiUrl'].default; if (url !== 'https://api.waitlayer.com/api/v1') throw new Error('Unexpected waitlayer.apiUrl default: ' + url);"
          node scripts/verify-vsix-artifact.cjs /tmp/waitlayer-vsix/extension

  # Build the Docker images and prove the COMPILED artifacts actually serve
  # traffic. The integration suite only exercises the source AppModule via
  # in-process supertest, so a broken container build (e.g. A-083 — web
  # secrets inlined at build time, not runtime) would otherwise pass CI
  # undetected. This job catches that blind spot.
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The main build-and-test job already typechecks and lints against the
      # source tree. Re-run here in the docker-build context so a Dockerfile or
      # compose change that breaks the build environment is caught before any
      # image is trusted.
      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      # Web reads JWT_SECRET + NEXT_PUBLIC_* at *build* time (Edge middleware
      # inlines env). Passing them as build args proves the image bakes them
      # in; a missing arg would fail the deploy (A-083), not silently break auth.
      - name: Build web image (verifies build-time secret wiring)
        run: docker compose build web
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
          NEXT_PUBLIC_API_URL: http://localhost:4002/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: '53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com'
          NEXT_PUBLIC_ALLOW_MOCK_AUTH: 'true'
      # Boot the COMPILED api image against real Postgres + Redis and confirm
      # it serves a real request over a socket (closes the standalone-404 gap
      # that the in-process suite could never catch).
      - name: Build + boot API and verify it serves over TCP
        run: |
          docker compose up -d api postgres redis
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4002/api/v1/health/ready; then
              echo "API healthy over TCP"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API container did not become ready within timeout"; exit 1
            fi
            sleep 2
          done
          # Controllers resolve over TCP (guards the standalone-404 bug class):
          # a 404 here means the compiled image dropped a route — fail the build.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            http://localhost:4002/api/v1/auth/login \
            -H 'Content-Type: application/json' -d '{}')
          if [ "$STATUS" != "400" ]; then echo "Unexpected login validation status: $STATUS (expected 400)"; exit 1; fi
          echo "Controller route resolved over TCP with expected validation status 400"
          docker compose down -v
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+

      # Build and boot the web image, then verify it serves a 200 on the
      # root path. This closes the gap where the API image is tested but the
      # web image is only built (and could fail at runtime due to CSP, env,
      # or static-generation issues).
      - name: Build + boot web and verify it serves over TCP
        run: |
          docker compose up -d web
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000; then
              echo "Web healthy over TCP"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Web container did not become healthy within timeout"; exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://localhost:3000/api/auth/login \
              -H 'Content-Type: application/json' \
              -H 'Origin: http://localhost:3000' \
              -d '{}')
            if [ "$STATUS" = "400" ]; then
              echo "Web BFF reached the API and returned validation status 400"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Web BFF never reached a healthy API (last status $STATUS)"; exit 1
            fi
            sleep 2
          done
          AUTH_STATUS=$(curl -s -o /tmp/waitlayer-auth.json -w '%{http_code}' \
            -c /tmp/waitlayer-cookies.txt -X POST \
            http://localhost:3000/api/auth/google \
            -H 'Content-Type: application/json' \
            -H 'Origin: http://localhost:3000' \
            -d '{"idToken":"mock-google-token-docker-ci","role":"developer","ageConfirmed":true,"termsAccepted":true,"policyVersion":"2026-07-01"}')
          if [ "$AUTH_STATUS" != "200" ]; then
            echo "Web BFF mock sign-in failed with status $AUTH_STATUS"; exit 1
          fi
          PROTECTED_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -b /tmp/waitlayer-cookies.txt http://localhost:3000/developer)
          if [ "$PROTECTED_STATUS" != "200" ]; then
            echo "Protected web route rejected API-issued cookie (status $PROTECTED_STATUS)"; exit 1
          fi
          echo "Web BFF sign-in and protected-route JWT verification succeeded"
          docker compose down -v
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
  # Docs-drift guard: assert AGENTS.md's key claims still match the code.
  # Cheap, no DB, no install — runs on plain node. Keeps the audit narrative
  # honest (the prior standalone-404 false claim is now machine-enforced).
  verify-audit-claims:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
      - name: Verify AGENTS.md claims match code
        run: node scripts/audit-claims.mjs
