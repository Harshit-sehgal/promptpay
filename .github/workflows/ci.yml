name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client is generated by the `@waitlayer/db` `build` script, which
      # turbo runs as a dependency of typecheck/test. Generate it explicitly
      # here too so the client exists before any package script that calls it
      # directly, and so the DB provision step below has it available.
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db exec prisma generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      # Provision the CI Postgres service with the actual schema before tests.
      # The integration specs (e2e-http-flow, contract-tests) boot the real
      # AppModule against DATABASE_URL and issue TRUNCATE/CLEAN against the
      # live tables — without a migrated schema they fail in beforeAll with
      # "relation ... does not exist", red-flaking the whole test step. Running
      # `migrate deploy` from a fresh DB replays 0_init + every subsequent
      # migration (timestamptz, cascades, uniques) so tests see the same
      # schema the developer/migration authors validated.
      - name: Provision database schema
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-ci@localhost:5432/waitlayer
        run: pnpm --filter @waitlayer/db exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Test
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-ci@localhost:5432/waitlayer
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long-ok
          NODE_ENV: test
          EMAIL_DRIVER: console
          EMAIL_FROM: noreply@ci.local
        # Use test:cov (vitest --coverage) so the coverage artifact uploaded
        # below is real (v8 html reporter writes to apps/api/coverage/) rather
        # than an always-empty directory.
        run: pnpm --filter waitlayer-api run test:cov

      # Upload Sentry source maps on main-branch builds if SENTRY_AUTH_TOKEN
      # is available (set as a GitHub Actions secret). The Sentry CLI is
      # bundled with @sentry/nextjs / @sentry/nestjs — no separate install.
      - name: Build
        run: pnpm run build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage/
