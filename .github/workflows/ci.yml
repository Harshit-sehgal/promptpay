name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Typecheck (isolated job: fastest feedback, runs in parallel) ──
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Typecheck
        run: pnpm run typecheck

  # ── Lint (isolated job) ──
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Lint
        run: pnpm run lint

  # ── Build (isolated job) ──
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Build
        run: pnpm run build
      # P0.8: prove the host-side build output embeds no signing secrets
      # (default targets: apps/web/.next + apps/api/dist).
      - name: Scan build output for embedded signing secrets
        run: node scripts/scan-build-secrets.mjs

  # ── Unit / integration tests + migration release gate + coverage ──
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer_test
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waitlayer -d waitlayer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
      JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Generate ephemeral RS256 keys
        run: |
          PRIVATE_KEY=$(openssl genrsa 2048 2>/dev/null)
          PUBLIC_KEY=$(printf '%s\n' "$PRIVATE_KEY" | openssl rsa -pubout 2>/dev/null)
          {
            echo 'JWT_PRIVATE_KEY<<WAITLAYER_PRIVATE_KEY_EOF'
            printf '%s\n' "$PRIVATE_KEY"
            echo 'WAITLAYER_PRIVATE_KEY_EOF'
            echo 'JWT_PUBLIC_KEY<<WAITLAYER_PUBLIC_KEY_EOF'
            printf '%s\n' "$PUBLIC_KEY"
            echo 'WAITLAYER_PUBLIC_KEY_EOF'
          } >> "$GITHUB_ENV"
      - name: Audit dependencies
        run: pnpm audit --audit-level moderate
      - name: Apply migrations
        run: pnpm --filter @waitlayer/db migrate:deploy
      - name: Assert no pending migrations
        run: pnpm --filter @waitlayer/db migrate:status
      - name: Assert migration-built schema has no drift
        run: pnpm --filter @waitlayer/db migrate:drift
      - name: Test
        run: pnpm test
      - name: Enforce API coverage
        run: pnpm --filter waitlayer-api test:cov
      - name: Enforce financial-module branch coverage
        run: node scripts/enforce-financial-coverage.mjs

  # ── Playwright browser E2E + production health-metric enforcement ──
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer_test
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waitlayer -d waitlayer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
      JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate
      - name: Generate ephemeral RS256 keys
        run: |
          PRIVATE_KEY=$(openssl genrsa 2048 2>/dev/null)
          PUBLIC_KEY=$(printf '%s\n' "$PRIVATE_KEY" | openssl rsa -pubout 2>/dev/null)
          {
            echo 'JWT_PRIVATE_KEY<<WAITLAYER_PRIVATE_KEY_EOF'
            printf '%s\n' "$PRIVATE_KEY"
            echo 'WAITLAYER_PRIVATE_KEY_EOF'
            echo 'JWT_PUBLIC_KEY<<WAITLAYER_PUBLIC_KEY_EOF'
            printf '%s\n' "$PUBLIC_KEY"
            echo 'WAITLAYER_PUBLIC_KEY_EOF'
          } >> "$GITHUB_ENV"
      - name: Install Playwright browsers
        run: pnpm --filter waitlayer-web exec playwright install --with-deps chromium
      - name: Boot API for E2E
        run: |
          pnpm --filter waitlayer-api build
          node apps/api/dist/apps/api/src/main.js &
          API_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:4002/api/v1/health/ready; then break; fi
            if [ "$i" -eq 30 ]; then echo "API not ready"; kill $API_PID 2>/dev/null; exit 1; fi
            sleep 2
          done
          echo "API_PID=$API_PID" >> /tmp/e2e_pids
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
          REDIS_URL: redis://localhost:6379
          WEB_BASE_URL: http://localhost:3000
      - name: Build and boot web for E2E
        run: |
          pnpm --filter waitlayer-web build
          pnpm --filter waitlayer-web start &
          WEB_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:3000; then break; fi
            if [ "$i" -eq 30 ]; then echo "Web not ready"; kill $WEB_PID 2>/dev/null; exit 1; fi
            sleep 2
          done
          echo "WEB_PID=$WEB_PID" >> /tmp/e2e_pids
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+
          COOKIE_SECURE: 'false'
          NEXT_PUBLIC_API_URL: http://localhost:4002/api/v1
          NEXT_PUBLIC_ALLOW_MOCK_AUTH: 'true'
      - name: Run Playwright E2E tests
        run: pnpm --filter waitlayer-web e2e
        env:
          E2E_BASE_URL: http://localhost:3000
      - name: Enforce health metrics
        run: pnpm --filter waitlayer-api exec node "$GITHUB_WORKSPACE/scripts/enforce-health-metrics.mjs"
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
          API_BASE_URL: http://localhost:4002
      - name: Cleanup E2E servers
        if: always()
        run: |
          if [ -f /tmp/e2e_pids ]; then
            source /tmp/e2e_pids
            kill $API_PID $WEB_PID 2>/dev/null || true
            rm -f /tmp/e2e_pids
          fi
      - name: Verify CLI bin artifacts exist
        run: pnpm --filter waitlayer-cli pack:check

  # Packaging smoke tests for distributed clients (A-043) — run without a DB.
  package-clients:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm --filter waitlayer-cli build
      - name: Verify CLI bin artifacts
        run: pnpm --filter waitlayer-cli pack:check
      - name: Pack CLI artifact
        run: |
          mkdir -p artifacts/cli
          pnpm --filter waitlayer-cli pack --pack-destination "$GITHUB_WORKSPACE/artifacts/cli"
      - name: Smoke install packaged CLI
        run: |
          npm install --global ./artifacts/cli/*.tgz
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --version
          WAITLAYER_API_URL=https://api.waitlayer.com/api/v1 waitlayer --help
      - name: Build VS Code extension
        run: pnpm --filter waitlayer-vscode build
      - name: Package VS Code extension (no publish)
        run: |
          mkdir -p artifacts/vscode
          pnpm --filter waitlayer-vscode exec vsce package --no-dependencies -o "$GITHUB_WORKSPACE/artifacts/vscode/waitlayer-vscode.vsix"
      - name: Smoke test VSIX metadata
        run: |
          test -s artifacts/vscode/waitlayer-vscode.vsix
          rm -rf /tmp/waitlayer-vsix
          mkdir -p /tmp/waitlayer-vsix
          unzip -q artifacts/vscode/waitlayer-vscode.vsix -d /tmp/waitlayer-vsix
          cp /tmp/waitlayer-vsix/extension/package.json /tmp/waitlayer-vscode-package.json
          node -e "const pkg = require('/tmp/waitlayer-vscode-package.json'); const url = pkg.contributes.configuration.properties['waitlayer.apiUrl'].default; if (url !== 'https://api.waitlayer.com/api/v1') throw new Error('Unexpected waitlayer.apiUrl default: ' + url);"
          node scripts/verify-vsix-artifact.cjs /tmp/waitlayer-vsix/extension

  # Build the Docker images and prove the COMPILED artifacts actually serve
  # traffic. The integration suite only exercises the source AppModule via
  # in-process supertest, so a broken container build (e.g. A-083 — web
  # secrets inlined at build time, not runtime) would otherwise pass CI
  # undetected. This job catches that blind spot.
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # P0.8 defense-in-depth: never emit buildx provenance/SBOM attestations.
      # Provenance records build-arg values; no signing secrets are build args
      # today, and this keeps that true even if a future build path switches
      # to `docker buildx build` (which emits attestations by default).
      BUILDX_NO_DEFAULT_ATTESTATIONS: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @waitlayer/db generate

      - name: Generate ephemeral RS256 keys
        run: |
          PRIVATE_KEY=$(openssl genrsa 2048 2>/dev/null)
          PUBLIC_KEY=$(printf '%s\n' "$PRIVATE_KEY" | openssl rsa -pubout 2>/dev/null)
          {
            echo 'JWT_PRIVATE_KEY<<WAITLAYER_PRIVATE_KEY_EOF'
            printf '%s\n' "$PRIVATE_KEY"
            echo 'WAITLAYER_PRIVATE_KEY_EOF'
            echo 'JWT_PUBLIC_KEY<<WAITLAYER_PUBLIC_KEY_EOF'
            printf '%s\n' "$PUBLIC_KEY"
            echo 'WAITLAYER_PUBLIC_KEY_EOF'
          } >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # The main build-and-test job already typechecks and lints against the
      # source tree. Re-run here in the docker-build context so a Dockerfile or
      # compose change that breaks the build environment is caught before any
      # image is trusted.
      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      # Web reads JWT_PUBLIC_KEY + NEXT_PUBLIC_* at build time (Edge middleware
      # inlines them). JWT_SECRET remains runtime-only for BFF HMAC signing.
      - name: Build web image (verifies build-time secret wiring)
        run: docker compose -f docker-compose.yml build web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4002/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: '53592884041-8ctl5qb8dm99p9a5e7hf4gthgmgenabl.apps.googleusercontent.com'
          NEXT_PUBLIC_ALLOW_MOCK_AUTH: 'true'
      # The web image is built INSIDE Docker, so the host apps/web/.next path
      # does not exist in this job — scanning it would pass vacuously. Extract
      # the built bundle from the image and scan that instead. The script
      # hard-fails when an explicit target is missing.
      - name: Scan web build output for embedded signing secrets
        run: |
          img=$(docker compose -f docker-compose.yml config --images | grep -- '-web$' | head -1)
          test -n "$img" || { echo "web image name could not be resolved"; exit 1; }
          cid=$(docker create "$img")
          trap 'docker rm -f "$cid" >/dev/null' EXIT
          rm -rf "$RUNNER_TEMP/web-next-scan"
          docker cp "$cid":/app/apps/web/.next "$RUNNER_TEMP/web-next-scan"
          node scripts/scan-build-secrets.mjs "$RUNNER_TEMP/web-next-scan"
      # Boot the COMPILED api image against real Postgres + Redis and confirm
      # it serves a real request over a socket (closes the standalone-404 gap
      # that the in-process suite could never catch).
      - name: Build + boot API and verify it serves over TCP
        run: |
          docker compose -f docker-compose.yml up -d api postgres redis
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4002/api/v1/health/ready; then
              echo "API healthy over TCP"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API container did not become ready within timeout"; exit 1
            fi
            sleep 2
          done
          # Controllers resolve over TCP (guards the standalone-404 bug class):
          # a 404 here means the compiled image dropped a route — fail the build.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            http://localhost:4002/api/v1/auth/login \
            -H 'Content-Type: application/json' -d '{}')
          if [ "$STATUS" != "400" ]; then echo "Unexpected login validation status: $STATUS (expected 400)"; exit 1; fi
          echo "Controller route resolved over TCP with expected validation status 400"

          # Unauthenticated GET /auth/me must resolve over TCP and return 401
          # (NOT 404): proves the auth controller is wired into the compiled
          # image. A 404 here means the route was dropped at build time.
          ME_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            http://localhost:4002/api/v1/auth/me)
          if [ "$ME_STATUS" != "401" ]; then
            echo "Unexpected GET /api/v1/auth/me status: $ME_STATUS (expected 401, not 404)"; exit 1
          fi
          echo "GET /api/v1/auth/me resolved over TCP with expected status 401"

          # Swagger docs route must resolve over TCP and return 200 (NOT 404).
          # docker-compose boots the api with NODE_ENV=development, so the
          # OpenAPI UI is enabled; a 404 here means the doc route regressed.
          DOCS_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            http://localhost:4002/api/v1/docs)
          if [ "$DOCS_STATUS" != "200" ]; then
            echo "Unexpected /api/v1/docs status: $DOCS_STATUS (expected 200, not 404)"; exit 1
          fi
          echo "GET /api/v1/docs resolved over TCP with expected status 200"

          docker compose -f docker-compose.yml down -v
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+

      # Build and boot the web image, then verify it serves a 200 on the
      # root path. This closes the gap where the API image is tested but the
      # web image is only built (and could fail at runtime due to CSP, env,
      # or static-generation issues).
      - name: Build + boot web and verify it serves over TCP
        run: |
          docker compose -f docker-compose.yml up -d web
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000; then
              echo "Web healthy over TCP"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Web container did not become healthy within timeout"; exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://localhost:3000/api/auth/login \
              -H 'Content-Type: application/json' \
              -H 'Origin: http://localhost:3000' \
              -d '{}')
            if [ "$STATUS" = "400" ]; then
              echo "Web BFF reached the API and returned validation status 400"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Web BFF never reached a healthy API (last status $STATUS)"; exit 1
            fi
            sleep 2
          done
          AUTH_STATUS=$(curl -s -o /tmp/waitlayer-auth.json -w '%{http_code}' \
            -c /tmp/waitlayer-cookies.txt -X POST \
            http://localhost:3000/api/auth/google \
            -H 'Content-Type: application/json' \
            -H 'Origin: http://localhost:3000' \
            -d '{"idToken":"mock-google-token-docker-ci","role":"developer","ageConfirmed":true,"termsAccepted":true,"policyVersion":"2026-07-01"}')
          if [ "$AUTH_STATUS" != "200" ]; then
            echo "Web BFF mock sign-in failed with status $AUTH_STATUS"; exit 1
          fi
          PROTECTED_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -b /tmp/waitlayer-cookies.txt http://localhost:3000/developer)
          if [ "$PROTECTED_STATUS" != "200" ]; then
            echo "Protected web route rejected API-issued cookie (status $PROTECTED_STATUS)"; exit 1
          fi
          echo "Web BFF sign-in and protected-route JWT verification succeeded"
          docker compose -f docker-compose.yml down -v
        env:
          JWT_SECRET: test-jwt-secret-for-integration-test-runs-only-32+

  # ── Backup & restore DR drill (mandatory priority) ──
  # Proves backups are demonstrably testable: seed the test DB, take a logical
  # dump, restore it into a FRESH database, apply migrations, and assert row
  # counts + the per-currency financial invariant match. A restore that drops a
  # ledger row fails the invariant even if row counts coincidentally match.
  backup-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer_test
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waitlayer -d waitlayer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SOURCE_DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build database package
        run: pnpm --filter @waitlayer/db build
      - name: Apply migrations to source DB
        run: pnpm --filter @waitlayer/db migrate:deploy
        env:
          DATABASE_URL: ${{ env.SOURCE_DATABASE_URL }}
      - name: Seed source DB with reference data
        run: node scripts/seed-dr-data.mjs
        env:
          DATABASE_URL: ${{ env.SOURCE_DATABASE_URL }}
      - name: Backup source DB
        run: |
          ./scripts/backup-db.sh ./backups "$SOURCE_DATABASE_URL"
      - name: Create fresh restore-target DB
        run: |
          psql "$SOURCE_DATABASE_URL" -c "DROP DATABASE IF EXISTS waitlayer_restored;"
          psql "$SOURCE_DATABASE_URL" -c "CREATE DATABASE waitlayer_restored;"
      - name: Restore into fresh DB
        run: |
          DUMP=$(ls -1 backups/waitlayer-db-*.dump.gz | head -1)
          ./scripts/restore-db.sh "$DUMP" "postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_restored"
      - name: Apply migrations to restored DB
        run: pnpm --filter @waitlayer/db migrate:deploy
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_restored
      - name: Verify backup integrity (row counts + financial invariant)
        run: |
          RESTORED_DATABASE_URL="postgresql://waitlayer:waitlayer-test@localhost:5432/waitlayer_restored" \
          node scripts/verify-backup.mjs

  # Docs-drift guard: assert AGENTS.md's key claims still match the code.
  # Cheap, no DB, no install — runs on plain node. Keeps the audit narrative
  # honest (the prior standalone-404 false claim is now machine-enforced).
  verify-audit-claims:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
      - name: Verify AGENTS.md claims match code
        run: node scripts/audit-claims.mjs
  # ── Security scanning (P1.22) ──
  # CodeQL, secret scanning, filesystem CVE scan, SBOM, and license check.
  # Blocking: a critical secret leak or CRITICAL/HIGH CVE must fail the
  # release. Trivy already gates on CRITICAL,HIGH (exit-code 1); gitleaks
  # fails on any leak; this job no longer runs advisory.
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
      - name: Filesystem vulnerability scan (trivy)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: waitlayer-sbom.spdx.json
      - name: License check
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0
      - run: pnpm install --frozen-lockfile
      - name: Enforce license policy (deny AGPL/GPL/SSPL/OSL/CC-BY-NC)
        run: node scripts/check-licenses.mjs
