name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlayer
          POSTGRES_USER: waitlayer
          POSTGRES_PASSWORD: waitlayer-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        env:
          DATABASE_URL: postgresql://waitlayer:waitlayer-ci@localhost:5432/waitlayer
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long-ok
          EXTENSION_HMAC_SECRET: ci-test-hmac-secret-at-least-32-chars-long-ok
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          EMAIL_DRIVER: console
          EMAIL_FROM: noreply@ci.local
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage/