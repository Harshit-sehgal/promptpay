packages:
  - "apps/*"
  - "packages/*"

overrides:
  multer: 2.2.0
  postcss: 8.5.16

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@sentry/node-cpu-profiler': true
  keytar: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Disable minimum-release-age check so that recently-published packages
# (e.g. @typescript 7.0.2 architecture-specific optional packages) do not
# block pnpm install / pre-commit hooks. The default is 1440 minutes (24h).
minimumReleaseAge: 0
