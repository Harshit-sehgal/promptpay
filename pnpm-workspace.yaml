packages:
  - 'apps/*'
  - 'packages/*'
  - 'tools/*'

overrides:
  # Security floors for transitive Next/Sentry and AJV dependency paths.
  # Keep these explicit until the direct packages raise their own lower bounds.
  fast-uri: 3.1.4
  multer: 2.2.0
  postcss: 8.5.16
  sharp: 0.35.0

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@sentry/cli': true
  '@sentry/node-cpu-profiler': true
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Quarantine brand-new package releases for 24 hours. Frozen-lockfile CI uses
# the reviewed graph below; intentional upgrades are retried after this window
# rather than making a just-published artifact immediately installable.
minimumReleaseAge: 1440
